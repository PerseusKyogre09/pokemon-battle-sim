name: Sync to Hugging Face Hub

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: false # Set to true if you ever use large files

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          
          # Create a clean orphan branch to avoid history issues
          git checkout --orphan hf-deploy
          
          # Remove everything we don't want in the backend space
          git rm -rf --cached . 
          
          # Add only the necessary backend files
          git add fastapi_server.py game.py ai.py data_loader.py moveset.py pokemon.py \
                  ability_system.py pokemon_utils.py priority_system.py status_effects.py move.py \
                  fetcher.py requirements.txt Dockerfile README.md datasets/ moves/ gen8_stats_sets.json
          
          git commit -m "Automated clean sync from GitHub"
          
          # Force push to HF main
          git push --force "https://PerseusKyogre:$HF_TOKEN@huggingface.co/spaces/PerseusKyogre/Pokemon-Battle-Sim" hf-deploy:main
