name: Sync to Hugging Face Hub

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: false

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          
          # Create a clean orphan branch for HF deployment
          git checkout --orphan hf-deploy
          
          # Remove all files from the current tracking
          git rm -rf --cached . 
          
          # Copy backend files to root
          cp -r backend/* .
          cp README.md .
          
          # Add all files to the new branch
          git add .
          
          git commit -m "Deploy to Hugging Face Spaces"
          
          # Force push to HF Space (replace with your repo path if different)
          # The user's repo path was seen in sync_to_hf.yml as PerseusKyogre/Pokemon-Battle-Sim
          git push --force "https://PerseusKyogre:$HF_TOKEN@huggingface.co/spaces/PerseusKyogre/Pokemon-Battle-Sim" hf-deploy:main
