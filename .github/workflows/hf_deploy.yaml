name: Sync to Hugging Face Hub

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: false

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          
          # Create a temporary directory to hold the deployment files
          mkdir deploy_dir
          cp -r backend/* deploy_dir/
          cp README.md deploy_dir/
          
          # Switch to the orphan branch
          git checkout --orphan hf-deploy
          
          # Physically remove everything in the repo
          git rm -rf .
          
          # Move files from the temp directory to the root
          mv deploy_dir/* .
          rmdir deploy_dir
          
          # Add all files to the new branch
          git add .
          
          git commit -m "Deploy to Hugging Face Spaces"
          
          # Force push to HF Space
          git push --force "https://PerseusKyogre:$HF_TOKEN@huggingface.co/spaces/PerseusKyogre/Pokemon-Battle-Sim" hf-deploy:main
